services:
  ntfy:
    image: docker.io/binwiederhier/ntfy:latest
    command: serve
    hostname: ntfy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-init:
    image: localhost/test:docker-moouro-${PYTEST_PG_VERSION:-9.6}
    pull_policy: never
    tty: false
    stdin_open: false
    user: "0:0"
    entrypoint: ["/bin/sh"]
    command: ["-c", "chown -R postgres:postgres /var/lib/restic /var/lib/pgbackrest"]
    volumes:
      - restic:/var/lib/restic
      - pgbackrest:/var/lib/pgbackrest
    restart: "no"

  db:
    image: localhost/test:docker-moouro-${PYTEST_PG_VERSION:-9.6}
    pull_policy: never
    tty: false
    stdin_open: false
    shm_size: 128mb
    depends_on:
      db-init:
        condition: service_completed_successfully
      ntfy:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_ODOO_PASSWORD_FILE: /run/secrets/odoo_db_password
      POSTGRES_ODOO_USER: odoo
      POSTGRES_ODOO_DB: odoodb
      POSTGRES_INITDB_ARGS: --locale=C --encoding=UTF8
    volumes:
      - ./config/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro,Z # Auto-Generated by pytest
      - ./config/$PYTEST_PG_CONFIG:/etc/postgresql/postgresql.conf:ro,Z
      - ./config/resticprofile.yaml:/etc/resticprofile/profiles.yaml:ro,Z
      - ./config/apprise.yaml:/etc/apprise/apprise.yaml:ro,Z
      - restic:/var/lib/restic
      - pgbackrest:/var/lib/pgbackrest
      - filestore:/var/lib/odoo/data
      - db:${PYTEST_PG_DATA_VOLUME:-/var/lib/postgresql/data}
    secrets:
      - restic_password
      - odoo_db_password
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    hostname: odoo-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d odoodb"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  odoo:
    image: localhost/test:docker-moouro-odoo-${PYTEST_PG_VERSION:-9.6}
    pull_policy: never
    tty: false
    stdin_open: false
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '127.0.0.1:8069:8069'
    secrets:
      - odoo_db_password
    environment:
      OCONF__options__log_level: debug
      OCONF__options__db_filter: odoodb$
      OCONF__options__db_user: odoo
      FOCONF__options__db_password: /run/secrets/odoo_db_password
      OCONF__options__db_host: odoo-db
      OCONF__options__db_name: odoodb
      OCONF__options__proxy_mode: false
      OCONF__options__workers: 0
      OCONF__options__max_cron_threads: 0
      OCONF__options__without_demo: all
    volumes:
      - filestore:/var/lib/odoo/data
    hostname: odoo


secrets:
  restic_password:
    x-podman.relabel: Z
    file: ./secrets/restic_password.txt
  odoo_db_password:
    x-podman.relabel: Z
    file: ./secrets/odoo_db_password.txt

volumes:
  filestore:
  db:
  restic:
  pgbackrest:
