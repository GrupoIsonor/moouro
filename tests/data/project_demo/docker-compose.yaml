services:
  ntfy:
    image: docker.io/binwiederhier/ntfy:latest
    command: serve
    hostname: ntfy

  db:
    image: localhost/test:docker-moouro-${PYTEST_PG_VERSION:-9.3}
    pull_policy: never
    tty: false
    stdin_open: false
    shm_size: 128mb
    user: postgres
    stop_grace_period: 300s  # psql 9.3 needs a lot of time to shutdown
    depends_on:
      - ntfy
    environment:
      POSTGRES_DB: odoodb
      POSTGRES_PASSWORD: odoo
      POSTGRES_USER: odoo
      POSTGRES_INITDB_ARGS: --locale=C --encoding=UTF8
    volumes:
      - ./config/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:z # Auto-Generated by pytest
      - ./config/$PYTEST_PG_CONFIG:/etc/postgresql/postgresql.conf:z
      - ./config/resticprofile.yaml:/etc/resticprofile/profiles.yaml:z
      - ./config/apprise.yaml:/etc/apprise/apprise.yaml:z
      - restic:/var/lib/restic
      - pgbackrest:/var/lib/pgbackrest
      - filestore:/var/lib/odoo/data
      - db:${PYTEST_PG_DATA:-/var/lib/postgresql/data} # moouro-test_db
    secrets:
      - restic_password
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    hostname: odoo-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d odoodb"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  odoo:
    image: localhost/test:docker-moouro-odoo-${PYTEST_PG_VERSION:-9.3}
    pull_policy: never
    tty: false
    stdin_open: false
    user: odoo
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '127.0.0.1:8080:8080'
      - '127.0.0.1:8069:8069'
    environment:
      OCONF__options__log_level: debug
      OCONF__options__db_filter: odoodb$
      OCONF__options__db_user: odoo
      OCONF__options__db_password: odoo
      OCONF__options__db_host: odoo-db
      OCONF__options__db_name: odoodb
      OCONF__options__proxy_mode: false
      OCONF__options__workers: 0
      OCONF__options__max_cron_threads: 0
      OCONF__options__without_demo: all
    volumes:
      - filestore:/var/lib/odoo/data
    hostname: odoo


secrets:
  restic_password:
    file: ./config/restic_password.txt

volumes:
  filestore:
  db:
  restic:
  pgbackrest:
